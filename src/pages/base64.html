<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64编解码器 - devtools-tools</title>
    <meta name="description" content="用于数据传输和存储的Base64编码/解码。">
    <link rel="stylesheet" href="/styles/global.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">devtools-tools</h1>
            <nav class="nav">
                <a href="/" class="nav-link">主页</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">工具</button>
                    <div class="nav-dropdown-content">
                        <a href="/uuid-generator/">UUID生成器</a>
                        <a href="/base64/">Base64编解码器</a>
                        <a href="/timestamp/">时间戳转换器</a>
                        <a href="/url-encoder/">URL编解码器</a>
                        <a href="/json-formatter/">JSON格式化器/校验器</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="tool-container">
            <div class="tool-header">
                <h1>Base64编解码器</h1>
                <p>用于数据传输和存储的Base64编码/解码。</p>
            </div>

            <div class="form-group">
                <label for="mode">模式</label>
                <select id="mode" class="form-control">
                    <option value="encode">编码（文本 → Base64）</option>
                    <option value="decode">解码（Base64 → 文本）</option>
                </select>
            </div>

            <div class="form-group">
                <label for="input-text">输入文本</label>
                <textarea 
                    id="input-text" 
                    placeholder="输入要编码的文本或Base64要解码的内容..."
                    rows="8"
                ></textarea>
            </div>

            <div class="form-group">
                <button id="convert-btn" class="button">转换</button>
                <button id="copy-output-btn" class="button secondary">复制输出</button>
                <button id="clear-btn" class="button secondary">清除</button>
            </div>

            <div id="alert-container"></div>

            <div class="form-group">
                <label for="output-text">输出</label>
                <textarea 
                    id="output-text" 
                    placeholder="结果将显示在这里..."
                    rows="8"
                    readonly
                ></textarea>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 devtools-tools。所有工具都在浏览器中运行，确保隐私安全。</p>
            <p>
                <a href="https://github.com/dhy13140526/devtools-tools" target="_blank">GitHub</a>
            </p>
        </div>
    </footer>

    <script src="/scripts/main.js"></script>
</body>
</html>
