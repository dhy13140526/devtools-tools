<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 - devtools-tools</title>
    <meta name="description" content="生成高强度的随机密码，支持自定义长度和字符组合。">
    <link rel="stylesheet" href="/styles/global.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">devtools-tools</h1>
            <nav class="nav">
                <a href="/" class="nav-link">主页</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">工具</button>
                    <div class="nav-dropdown-content">
                        <a href="/uuid-generator/">UUID生成器</a>
                        <a href="/base64/">Base64编解码器</a>
                        <a href="/timestamp/">时间戳转换器</a>
                        <a href="/url-encoder/">URL编解码器</a>
                        <a href="/json-formatter/">JSON格式化器/校验器</a>
                        <a href="/password-generator/">密码生成器</a>
                        <a href="/color-converter/">颜色转换器</a>
                        <a href="/regex-tester/">正则测试器</a>
                        <a href="/text-diff/">文本对比器</a>
                        <a href="/html-encoder/">HTML实体编解码</a>
                        <a href="/case-converter/">文本大小写转换</a>
                        <a href="/word-counter/">字符/单词计数</a>
                        <a href="/base-converter/">进制转换器</a>
                        <a href="/markdown-editor/">Markdown编辑器</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="tool-container">
                <div class="tool-header">
                    <h1>密码生成器</h1>
                    <p>生成高强度的随机密码，支持自定义长度和字符组合。</p>
                </div>

                <div class="form-group">
                    <label>密码长度：<span id="length-value">16</span></label>
                    <input type="range" id="password-length" class="form-control" min="4" max="128" value="16">
                </div>

                <div class="form-group">
                    <label>字符类型</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="use-uppercase" checked> 大写字母 (A-Z)</label>
                        <label><input type="checkbox" id="use-lowercase" checked> 小写字母 (a-z)</label>
                        <label><input type="checkbox" id="use-numbers" checked> 数字 (0-9)</label>
                        <label><input type="checkbox" id="use-symbols"> 特殊字符 (!@#$%^&*)</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>生成的密码</label>
                    <div class="password-display">
                        <input type="text" id="password-output" class="form-control" readonly>
                        <button id="copy-btn" class="button secondary">复制</button>
                    </div>
                </div>

                <div id="alert-container"></div>

                <div class="button-group">
                    <button id="generate-btn" class="button primary">生成密码</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 devtools-tools。所有工具都在浏览器中运行，确保隐私安全。</p>
            <p>
                <a href="https://github.com/dhy13140526/devtools-tools" target="_blank">GitHub</a>
            </p>
        </div>
    </footer>

    <script src="/scripts/main.js"></script>
</body>
</html>
