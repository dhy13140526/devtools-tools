<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正则测试器 - devtools-tools</title>
    <meta name="description" content="在线正则表达式测试，实时匹配结果展示，支持多种标志。">
    <link rel="stylesheet" href="/styles/global.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">devtools-tools</h1>
            <nav class="nav">
                <a href="/" class="nav-link">主页</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">工具</button>
                    <div class="nav-dropdown-content">
                        <a href="/uuid-generator/">UUID生成器</a>
                        <a href="/base64/">Base64编解码器</a>
                        <a href="/timestamp/">时间戳转换器</a>
                        <a href="/url-encoder/">URL编解码器</a>
                        <a href="/json-formatter/">JSON格式化器/校验器</a>
                        <a href="/password-generator/">密码生成器</a>
                        <a href="/color-converter/">颜色转换器</a>
                        <a href="/regex-tester/">正则测试器</a>
                        <a href="/text-diff/">文本对比器</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="tool-container">
                <div class="tool-header">
                    <h1>正则测试器</h1>
                    <p>在线正则表达式测试，实时匹配结果展示。</p>
                </div>

                <div class="form-group">
                    <label>正则表达式</label>
                    <input type="text" id="regex-pattern" class="form-control" placeholder="例：\d{4}-\d{2}-\d{2}">
                </div>

                <div class="form-group">
                    <label>标志</label>
                    <div class="regex-flags">
                        <label><input type="checkbox" id="flag-g"> 全局 (g)</label>
                        <label><input type="checkbox" id="flag-i"> 忽略大小写 (i)</label>
                        <label><input type="checkbox" id="flag-m"> 多行 (m)</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>测试文本</label>
                    <textarea id="test-text" class="form-control" rows="8" placeholder="输入要匹配的文本..."></textarea>
                </div>

                <div id="alert-container"></div>

                <div class="form-group">
                    <label>匹配结果</label>
                    <textarea id="match-result" class="form-control" rows="6" readonly placeholder="匹配结果将显示在这里..."></textarea>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 devtools-tools。所有工具都在浏览器中运行，确保隐私安全。</p>
            <p>
                <a href="https://github.com/dhy13140526/devtools-tools" target="_blank">GitHub</a>
            </p>
        </div>
    </footer>

    <script src="/scripts/main.js"></script>
</body>
</html>
