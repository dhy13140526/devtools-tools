<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间戳转换器 - devtools-tools</title>
    <meta name="description" content="转换Unix时间戳和人类可读日期。">
    <link rel="stylesheet" href="/styles/global.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">devtools-tools</h1>
            <nav class="nav">
                <a href="/" class="nav-link">主页</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">工具</button>
                    <div class="nav-dropdown-content">
                        <a href="/uuid-generator/">UUID生成器</a>
                        <a href="/base64/">Base64编解码器</a>
                        <a href="/timestamp/">时间戳转换器</a>
                        <a href="/url-encoder/">URL编解码器</a>
                        <a href="/json-formatter/">JSON格式化器/校验器</a>
                        <a href="/password-generator/">密码生成器</a>
                        <a href="/color-converter/">颜色转换器</a>
                        <a href="/regex-tester/">正则测试器</a>
                        <a href="/text-diff/">文本对比器</a>
                        <a href="/html-encoder/">HTML实体编解码</a>
                        <a href="/case-converter/">文本大小写转换</a>
                        <a href="/word-counter/">字符/单词计数</a>
                        <a href="/base-converter/">进制转换器</a>
                        <a href="/markdown-editor/">Markdown编辑器</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="tool-container">
            <div class="tool-header">
                <h1>时间戳转换器</h1>
                <p>转换Unix时间戳和人类可读日期。</p>
            </div>

            <div class="form-group">
                <label for="mode">模式</label>
                <select id="mode" class="form-control">
                    <option value="timestamp-to-date">时间戳 → 日期</option>
                    <option value="date-to-timestamp">日期 → 时间戳</option>
                </select>
            </div>

            <div class="form-group">
                <label for="input-value">输入</label>
                <textarea 
                    id="input-value" 
                    class="form-control"
                    placeholder="输入时间戳（如1700000000）或日期（如2023-11-15 10:30:00）..."
                    rows="5"
                ></textarea>
            </div>

            <div class="form-group">
                <button id="convert-btn" class="button">转换</button>
                <button id="copy-output-btn" class="button secondary">复制输出</button>
                <button id="clear-btn" class="button secondary">清除</button>
            </div>

            <div id="alert-container"></div>

            <div class="form-group">
                <label for="output-value">输出</label>
                <textarea 
                    id="output-value" 
                    class="form-control"
                    placeholder="结果将显示在这里..."
                    rows="5"
                    readonly
                ></textarea>
            </div>

            <div class="form-group">
                <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                    <button id="now-btn" class="button secondary">获取当前日期</button>
                    <button id="now-timestamp-btn" class="button secondary">获取当前时间戳</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 devtools-tools。所有工具都在浏览器中运行，确保隐私安全。</p>
            <p>
                <a href="https://github.com/dhy13140526/devtools-tools" target="_blank">GitHub</a>
            </p>
        </div>
    </footer>

    <script src="/scripts/main.js"></script>

</body>
</html>
