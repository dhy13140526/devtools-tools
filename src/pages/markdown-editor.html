<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown编辑器 - devtools-tools</title>
    <meta name="description" content="在线Markdown编辑器，实时预览渲染效果，支持标题、粗斜体、列表、代码块等。">
    <link rel="stylesheet" href="/styles/global.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">devtools-tools</h1>
            <nav class="nav">
                <a href="/" class="nav-link">主页</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">工具</button>
                    <div class="nav-dropdown-content">
                        <a href="/uuid-generator/">UUID生成器</a>
                        <a href="/base64/">Base64编解码器</a>
                        <a href="/timestamp/">时间戳转换器</a>
                        <a href="/url-encoder/">URL编解码器</a>
                        <a href="/json-formatter/">JSON格式化器/校验器</a>
                        <a href="/password-generator/">密码生成器</a>
                        <a href="/color-converter/">颜色转换器</a>
                        <a href="/regex-tester/">正则测试器</a>
                        <a href="/text-diff/">文本对比器</a>
                        <a href="/html-encoder/">HTML实体编解码</a>
                        <a href="/case-converter/">文本大小写转换</a>
                        <a href="/word-counter/">字符/单词计数</a>
                        <a href="/base-converter/">进制转换器</a>
                        <a href="/markdown-editor/">Markdown编辑器</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="tool-container" style="max-width:960px;">
                <div class="tool-header">
                    <h1>Markdown编辑器</h1>
                    <p>左侧编写，右侧实时预览，支持标题、粗斜体、链接、图片、列表、代码块。</p>
                </div>

                <div class="button-group" style="margin-bottom:16px;">
                    <button id="load-sample-btn" class="button secondary">加载示例</button>
                    <button id="clear-btn" class="button secondary">清除</button>
                </div>

                <div id="alert-container"></div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-group" style="margin:0;">
                        <label>Markdown</label>
                        <textarea id="md-input" class="form-control" rows="20" placeholder="在此输入 Markdown..." style="min-height:400px;font-size:13px;"></textarea>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label>预览</label>
                        <div id="md-preview" class="form-control" style="min-height:400px;overflow:auto;background:var(--surface);cursor:default;font-family:'Georgia','Noto Serif SC',serif;line-height:1.8;font-size:15px;color:var(--text);">
                            <p style="color:var(--text-muted);padding:20px;text-align:center;">输入 Markdown 后实时预览</p>
                        </div>
                    </div>
                </div>

                <div style="display:flex;justify-content:flex-end;margin-top:12px;">
                    <button id="copy-html-btn" class="button secondary" style="font-size:12px;">复制 HTML</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 devtools-tools。所有工具都在浏览器中运行，确保隐私安全。</p>
            <p><a href="https://github.com/dhy13140526/devtools-tools" target="_blank">GitHub</a></p>
        </div>
    </footer>

    <script src="/scripts/main.js"></script>
</body>
</html>
