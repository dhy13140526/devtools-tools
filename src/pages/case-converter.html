<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本大小写转换 - devtools-tools</title>
    <meta name="description" content="在线文本大小写转换，支持大写、小写、首字母大写、驼峰式、蛇形式、短横线式。">
    <link rel="stylesheet" href="/styles/global.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">devtools-tools</h1>
            <nav class="nav">
                <a href="/" class="nav-link">主页</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">工具</button>
                    <div class="nav-dropdown-content">
                        <a href="/uuid-generator/">UUID生成器</a>
                        <a href="/base64/">Base64编解码器</a>
                        <a href="/timestamp/">时间戳转换器</a>
                        <a href="/url-encoder/">URL编解码器</a>
                        <a href="/json-formatter/">JSON格式化器/校验器</a>
                        <a href="/password-generator/">密码生成器</a>
                        <a href="/color-converter/">颜色转换器</a>
                        <a href="/regex-tester/">正则测试器</a>
                        <a href="/text-diff/">文本对比器</a>
                        <a href="/html-encoder/">HTML实体编解码</a>
                        <a href="/case-converter/">文本大小写转换</a>
                        <a href="/word-counter/">字符/单词计数</a>
                        <a href="/base-converter/">进制转换器</a>
                        <a href="/markdown-editor/">Markdown编辑器</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="tool-container">
                <div class="tool-header">
                    <h1>文本大小写转换</h1>
                    <p>将文本转换为不同的大小写格式，支持多种命名风格。</p>
                </div>

                <div class="form-group">
                    <label>输入文本</label>
                    <textarea id="input-text" class="form-control" rows="6" placeholder="输入要转换的文本..."></textarea>
                </div>

                <div class="button-group">
                    <button id="convert-btn" class="button">转换</button>
                    <button id="clear-btn" class="button secondary">清除</button>
                </div>

                <div id="alert-container"></div>

                <div class="form-group">
                    <label>大写</label>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input type="text" id="output-uppercase" class="form-control" readonly placeholder="UPPERCASE" style="font-family:monospace;">
                        <button class="button secondary copy-btn" data-target="output-uppercase" style="white-space:nowrap;">复制</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>小写</label>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input type="text" id="output-lowercase" class="form-control" readonly placeholder="lowercase" style="font-family:monospace;">
                        <button class="button secondary copy-btn" data-target="output-lowercase" style="white-space:nowrap;">复制</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>首字母大写</label>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input type="text" id="output-title" class="form-control" readonly placeholder="Title Case" style="font-family:monospace;">
                        <button class="button secondary copy-btn" data-target="output-title" style="white-space:nowrap;">复制</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>驼峰式 (camelCase)</label>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input type="text" id="output-camel" class="form-control" readonly placeholder="camelCase" style="font-family:monospace;">
                        <button class="button secondary copy-btn" data-target="output-camel" style="white-space:nowrap;">复制</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>蛇形式 (snake_case)</label>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input type="text" id="output-snake" class="form-control" readonly placeholder="snake_case" style="font-family:monospace;">
                        <button class="button secondary copy-btn" data-target="output-snake" style="white-space:nowrap;">复制</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>短横线式 (kebab-case)</label>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input type="text" id="output-kebab" class="form-control" readonly placeholder="kebab-case" style="font-family:monospace;">
                        <button class="button secondary copy-btn" data-target="output-kebab" style="white-space:nowrap;">复制</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 devtools-tools。所有工具都在浏览器中运行，确保隐私安全。</p>
            <p><a href="https://github.com/dhy13140526/devtools-tools" target="_blank">GitHub</a></p>
        </div>
    </footer>

    <script src="/scripts/main.js"></script>
</body>
</html>
