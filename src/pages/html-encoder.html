<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML实体编解码器 - devtools-tools</title>
    <meta name="description" content="在线HTML实体编码/解码，将特殊字符转换为HTML实体或还原。">
    <link rel="stylesheet" href="/styles/global.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">devtools-tools</h1>
            <nav class="nav">
                <a href="/" class="nav-link">主页</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">工具</button>
                    <div class="nav-dropdown-content">
                        <a href="/uuid-generator/">UUID生成器</a>
                        <a href="/base64/">Base64编解码器</a>
                        <a href="/timestamp/">时间戳转换器</a>
                        <a href="/url-encoder/">URL编解码器</a>
                        <a href="/json-formatter/">JSON格式化器/校验器</a>
                        <a href="/password-generator/">密码生成器</a>
                        <a href="/color-converter/">颜色转换器</a>
                        <a href="/regex-tester/">正则测试器</a>
                        <a href="/text-diff/">文本对比器</a>
                        <a href="/html-encoder/">HTML实体编解码</a>
                        <a href="/case-converter/">文本大小写转换</a>
                        <a href="/word-counter/">字符/单词计数</a>
                        <a href="/base-converter/">进制转换器</a>
                        <a href="/markdown-editor/">Markdown编辑器</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="tool-container">
                <div class="tool-header">
                    <h1>HTML实体编解码</h1>
                    <p>将特殊字符转换为HTML实体，或从HTML实体还原为原始字符。</p>
                </div>

                <div class="form-group">
                    <label>模式</label>
                    <select id="mode" class="form-control">
                        <option value="encode">编码（文本 → HTML实体）</option>
                        <option value="decode">解码（HTML实体 → 文本）</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>输入</label>
                    <textarea id="input-text" class="form-control" rows="8" placeholder="输入要编码或解码的内容..."></textarea>
                </div>

                <div class="button-group">
                    <button id="convert-btn" class="button">转换</button>
                    <button id="copy-output-btn" class="button secondary">复制输出</button>
                    <button id="clear-btn" class="button secondary">清除</button>
                </div>

                <div id="alert-container"></div>

                <div class="form-group">
                    <label>输出</label>
                    <textarea id="output-text" class="form-control" rows="8" readonly placeholder="结果将显示在这里..."></textarea>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 devtools-tools。所有工具都在浏览器中运行，确保隐私安全。</p>
            <p><a href="https://github.com/dhy13140526/devtools-tools" target="_blank">GitHub</a></p>
        </div>
    </footer>

    <script src="/scripts/main.js"></script>
<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "5e0cc7b5ce6544289c2a0b5c4ed53582"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
