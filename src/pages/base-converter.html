<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进制转换器 - devtools-tools</title>
    <meta name="description" content="在线进制转换，支持二进制、八进制、十进制、十六进制之间的互相转换。">
    <link rel="stylesheet" href="/styles/global.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">devtools-tools</h1>
            <nav class="nav">
                <a href="/" class="nav-link">主页</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">工具</button>
                    <div class="nav-dropdown-content">
                        <a href="/uuid-generator/">UUID生成器</a>
                        <a href="/base64/">Base64编解码器</a>
                        <a href="/timestamp/">时间戳转换器</a>
                        <a href="/url-encoder/">URL编解码器</a>
                        <a href="/json-formatter/">JSON格式化器/校验器</a>
                        <a href="/password-generator/">密码生成器</a>
                        <a href="/color-converter/">颜色转换器</a>
                        <a href="/regex-tester/">正则测试器</a>
                        <a href="/text-diff/">文本对比器</a>
                        <a href="/html-encoder/">HTML实体编解码</a>
                        <a href="/case-converter/">文本大小写转换</a>
                        <a href="/word-counter/">字符/单词计数</a>
                        <a href="/base-converter/">进制转换器</a>
                        <a href="/markdown-editor/">Markdown编辑器</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="tool-container">
                <div class="tool-header">
                    <h1>进制转换器</h1>
                    <p>二进制、八进制、十进制、十六进制之间的互相转换。</p>
                </div>

                <div class="form-inline">
                    <div class="form-group">
                        <label>输入进制</label>
                        <select id="from-base" class="form-control">
                            <option value="2">二进制 (2)</option>
                            <option value="8">八进制 (8)</option>
                            <option value="10" selected>十进制 (10)</option>
                            <option value="16">十六进制 (16)</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:0 0 auto;padding-bottom:10px;">
                        <button id="swap-btn" class="button secondary" style="padding:10px 14px;">⇄</button>
                    </div>
                    <div class="form-group">
                        <label>输出进制</label>
                        <select id="to-base" class="form-control">
                            <option value="2">二进制 (2)</option>
                            <option value="8">八进制 (8)</option>
                            <option value="10">十进制 (10)</option>
                            <option value="16" selected>十六进制 (16)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>输入值</label>
                    <input type="text" id="input-value" class="form-control" placeholder="输入要转换的数字...">
                </div>

                <div id="alert-container"></div>

                <div class="form-group">
                    <label>转换结果</label>
                    <input type="text" id="output-value" class="form-control" readonly placeholder="转换结果将显示在这里..." style="font-family:monospace;font-size:16px;">
                </div>

                <div class="button-group">
                    <button id="copy-btn" class="button secondary">复制结果</button>
                    <button id="clear-btn" class="button secondary">清除</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 devtools-tools。所有工具都在浏览器中运行，确保隐私安全。</p>
            <p><a href="https://github.com/dhy13140526/devtools-tools" target="_blank">GitHub</a></p>
        </div>
    </footer>

    <script src="/scripts/main.js"></script>
</body>
</html>
