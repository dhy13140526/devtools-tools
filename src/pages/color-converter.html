<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜色转换器 - devtools-tools</title>
    <meta name="description" content="在线颜色格式转换，支持HEX、RGB、HSL之间的互相转换。">
    <link rel="stylesheet" href="/styles/global.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">devtools-tools</h1>
            <nav class="nav">
                <a href="/" class="nav-link">主页</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">工具</button>
                    <div class="nav-dropdown-content">
                        <a href="/uuid-generator/">UUID生成器</a>
                        <a href="/base64/">Base64编解码器</a>
                        <a href="/timestamp/">时间戳转换器</a>
                        <a href="/url-encoder/">URL编解码器</a>
                        <a href="/json-formatter/">JSON格式化器/校验器</a>
                        <a href="/password-generator/">密码生成器</a>
                        <a href="/color-converter/">颜色转换器</a>
                        <a href="/regex-tester/">正则测试器</a>
                        <a href="/text-diff/">文本对比器</a>
                        <a href="/html-encoder/">HTML实体编解码</a>
                        <a href="/case-converter/">文本大小写转换</a>
                        <a href="/word-counter/">字符/单词计数</a>
                        <a href="/base-converter/">进制转换器</a>
                        <a href="/markdown-editor/">Markdown编辑器</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="tool-container">
                <div class="tool-header">
                    <h1>颜色转换器</h1>
                    <p>在线颜色格式转换，支持HEX、RGB、HSL之间的互相转换。</p>
                </div>

                <div id="color-preview" class="color-preview" style="background: #6366f1;"></div>

                <div class="form-group">
                    <label>HEX</label>
                    <input type="text" id="hex-input" class="form-control" value="#6366f1" placeholder="#ffffff">
                </div>

                <div class="form-group">
                    <label>RGB</label>
                    <input type="text" id="rgb-input" class="form-control" value="99, 102, 241" placeholder="255, 255, 255">
                </div>

                <div class="form-group">
                    <label>HSL</label>
                    <input type="text" id="hsl-input" class="form-control" value="239, 84%, 67%" placeholder="0, 0%, 100%">
                </div>

                <div id="alert-container"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 devtools-tools。所有工具都在浏览器中运行，确保隐私安全。</p>
            <p>
                <a href="https://github.com/dhy13140526/devtools-tools" target="_blank">GitHub</a>
            </p>
        </div>
    </footer>

    <script src="/scripts/main.js"></script>
