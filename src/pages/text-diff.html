<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本对比器 - devtools-tools</title>
    <meta name="description" content="在线文本对比工具，快速比较两段文本的差异。">
    <link rel="stylesheet" href="/styles/global.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">devtools-tools</h1>
            <nav class="nav">
                <a href="/" class="nav-link">主页</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">工具</button>
                    <div class="nav-dropdown-content">
                        <a href="/uuid-generator/">UUID生成器</a>
                        <a href="/base64/">Base64编解码器</a>
                        <a href="/timestamp/">时间戳转换器</a>
                        <a href="/url-encoder/">URL编解码器</a>
                        <a href="/json-formatter/">JSON格式化器/校验器</a>
                        <a href="/password-generator/">密码生成器</a>
                        <a href="/color-converter/">颜色转换器</a>
                        <a href="/regex-tester/">正则测试器</a>
                        <a href="/text-diff/">文本对比器</a>
                        <a href="/html-encoder/">HTML实体编解码</a>
                        <a href="/case-converter/">文本大小写转换</a>
                        <a href="/word-counter/">字符/单词计数</a>
                        <a href="/base-converter/">进制转换器</a>
                        <a href="/markdown-editor/">Markdown编辑器</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="tool-container">
                <div class="tool-header">
                    <h1>文本对比器</h1>
                    <p>快速比较两段文本的差异，逐行对比。</p>
                </div>

                <div class="diff-output">
                    <div class="form-group">
                        <label>原文</label>
                        <textarea id="text-left" class="form-control" rows="10" placeholder="输入原始文本..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>修改后</label>
                        <textarea id="text-right" class="form-control" rows="10" placeholder="输入修改后的文本..."></textarea>
                    </div>
                </div>

                <div class="button-group" style="margin-bottom: 20px;">
                    <button id="compare-btn" class="button primary">对比</button>
                    <button id="clear-btn" class="button secondary">清除</button>
                </div>

                <div id="alert-container"></div>

                <div class="form-group">
                    <label>差异结果</label>
                    <textarea id="diff-result" class="form-control" rows="12" readonly placeholder="点击"对比"查看差异..."></textarea>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 devtools-tools。所有工具都在浏览器中运行，确保隐私安全。</p>
            <p>
                <a href="https://github.com/dhy13140526/devtools-tools" target="_blank">GitHub</a>
            </p>
        </div>
    </footer>

    <script src="/scripts/main.js"></script>
<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "5e0cc7b5ce6544289c2a0b5c4ed53582"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
